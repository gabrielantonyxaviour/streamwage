name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - run: npm ci
      - run: forge test
      - run: npm test
      - run: npm run build

